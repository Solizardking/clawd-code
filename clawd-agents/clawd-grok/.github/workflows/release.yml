name: Release

on:
  push:
    tags:
      - "clawd-dev@*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag to publish (for example clawd-dev@1.1.4)"
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            build_output: clawd
            asset_name: clawd-latest-linux-x64
          - runner: macos-latest
            build_output: clawd
            asset_name: clawd-latest-darwin-arm64
          - runner: windows-latest
            build_output: clawd.exe
            asset_name: clawd-latest-windows-x64.exe

    runs-on: ${{ matrix.runner }}

    permissions:
      contents: read
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Compile standalone binary
        run: bun build --compile --outfile "release/${{ matrix.build_output }}" ./src/index.ts

      - name: Compute checksum (unix)
        if: runner.os != 'Windows'
        shell: bash
        working-directory: release
        run: |
          cp "${{ matrix.build_output }}" "${{ matrix.asset_name }}"
          shasum -a 256 "${{ matrix.asset_name }}" > "${{ matrix.asset_name }}.sha256"

      - name: Compute checksum (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: release
        run: |
          Copy-Item "${{ matrix.build_output }}" "${{ matrix.asset_name }}"
          $hash = (Get-FileHash "${{ matrix.asset_name }}" -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.asset_name }}" | Out-File -Encoding ascii "${{ matrix.asset_name }}.sha256"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@2c04a00460b64b4dfd062384e60ea87fa18e1728 # v2
        with:
          subject-path: |
            release/${{ matrix.asset_name }}

      - name: Upload release artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            release/${{ matrix.asset_name }}
            release/${{ matrix.asset_name }}.sha256

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Resolve release tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ github.event.inputs.version }}"
          else
            tag="${{ github.ref_name }}"
          fi
          echo "RELEASE_TAG=${tag}" >> "$GITHUB_ENV"

      - name: Download all build artifacts
        uses: actions/download-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317 # v4
        with:
          path: release-assets

      - name: Merge checksums
        shell: bash
        run: |
          cat release-assets/**/*.sha256 | sort > release-assets/clawd-checksums-sha256.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@9ed3cf9a6863b31f005d951c8d19de20628cf4eb # v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          prerelease: ${{ contains(env.RELEASE_TAG, '-rc') || contains(env.RELEASE_TAG, '-alpha') || contains(env.RELEASE_TAG, '-beta') || contains(env.RELEASE_TAG, '-pre') }}
          files: |
            release-assets/**/clawd-latest-linux-x64
            release-assets/**/clawd-latest-darwin-arm64
            release-assets/**/clawd-latest-windows-x64.exe
            release-assets/clawd-checksums-sha256.txt
